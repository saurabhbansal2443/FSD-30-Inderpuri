<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* Selectors */
      /* 
        1) Element selector 
        2) Class selector
        3) id selector 
        4) attribute selector 
        5) Universal selector 
        6) Combinators 
         */
      /* Element selector  */
      h1 {
        font-family: cursive;
      }
      span{
        font-weight: 900;
      }
      
    </style>
  </head>
  <body>
    <!-- 
     Internal CSS 
      External CSS
      Inline CSS
     -->
    <!-- Inline CSS -->
    <h1 style="background-color: red; color: white">I am heading tag</h1>

    <!--  Internal CSS  -->
    <h1>I am heading tag 2</h1>
    <p>Lorem ipsum dolor sit amet.</p>
    <span>Lorem ipsum dolor sit amet consectetur.</span>
  </body>
</html>
