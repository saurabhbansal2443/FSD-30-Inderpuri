<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .parent {
      height: 100vh;
      width: 100vw;
      background-color: #0a2947;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      grid-template-rows: repeat(5, 1fr);
    }

    .child {
      border: 5px solid #0a2947;
    }
    .one {
      grid-column-start: 1;
      grid-column-end: 3;
      grid-row-start: 1;
      grid-row-end: 2;
      background-color: orange;
    }
    .two {
      grid-column-start: 3;
      grid-column-end: 4;
      grid-row-start: 1;
      grid-row-end: 2;
      background-color: darkgreen;
    }
    .three {
      grid-column-start: 4;
      grid-column-end: 5;
      grid-row-start: 1;
      grid-row-end: 2;
      background-color: lightpink;
    }

    .four {
      grid-column-start: 1;
      grid-column-end: 2;
      grid-row-start: 2;
      grid-row-end: 3;
      background-color: lightpink;
    }

    .five {
      grid-column-start: 2;
      grid-column-end: 3;
      grid-row-start: 2;
      grid-row-end: 3;
      background-color: greenyellow;
    }

    .six {
      grid-column-start: 3;
      grid-column-end: 4;
      grid-row-start: 2;
      grid-row-end: 3;
      background-color: lightsalmon;
    }
    .seven {
      grid-column-start: 1;
      grid-column-end: 3;
      grid-row-start: 3;
      grid-row-end: 5;
      background-color: lightskyblue;
    }
    .eight {
      grid-column-start: 1;
      grid-column-end: 4;
      grid-row-start: 5;
      grid-row-end: 6;
      background-color: lightslategrey;
    }
  </style>

  <body>
    <div class="parent">
      <div class="child one"></div>
      <div class="child two"></div>
      <div class="child three"></div>
      <div class="child four"></div>
      <div class="child five"></div>
      <div class="child six"></div>
      <div class="child" style="background-color: lightgrey;"></div>
      <div class="child seven"></div>
      <div class="child" style="background-color: rgb(65, 42, 33);"></div>
      <div class="child" style="background-color: lightcoral;"></div>
      <div class="child"></div>
      <div class="child"></div>
      <div class="child eight"></div>
      <div class="child"></div>
    </div>
  </body>
</html>
