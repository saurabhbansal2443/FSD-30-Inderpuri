<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* Relative Units 
        1) Vh and vw --> Depends on screensize 
        2) % --> depends on the parent
        3) em --> depends on the parent
        4) rem --> depends on the root element 
         */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .parent {
        border: 4px solid red;
        width: 50vw;
        height: 50vh;
        font-size: 2rem;
      }
      .child {
        border: 4px solid blue;
        width: 50%;
        height: 50%;
         font-size: 2rem;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      TEST
      <div class="child">TEST</div>
    </div>
  </body>
</html>
