<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* space (_) , > , + , ~  */
      /*  + will select the adjacent sibling 
      ~ will select all the adjacent siblings  */
      /* .parent p {
        color: blue;
      } */

      /* .grandChild> p {
        color: blue;
      } */

      .grandChild > p ~ p {
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <p>I am p1 tag</p>
      <div class="child">
        <p>I am p2 tag</p>
        <div class="grandChild">
          <p>I am p3tag</p>
          <p>I am p4tag</p>
          <p>I am p5tag</p>
        </div>
      </div>
    </div>
  </body>
</html>
